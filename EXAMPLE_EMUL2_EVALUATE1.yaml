timing: True
debug: False
stop_at_error: False

likelihood:
  desy1xplanck.cosmic_shear:
  #desy1xplanck.combo_2x2pt_ss_sk:
  #desy1xplanck.combo_3x2pt_ss_sk_sk:
    use_emulator: 2
    path: ./external_modules/data/desy1xplanck
    data_file: Y3xPlanckPR4.dataset
    print_datavector: False
    print_datavector_file: "./projects/desy1xplanck/chains/theory.modelvector"
    accuracyboost: 1.0
    integration_accuracy: 0
    lmax: 75000 # lmax computed for real space correlation function
    kmax_boltzmann: 7.5
    # 1 EE2, 2 Halofit
    non_linear_emul: 2
    IA_model: 0 # NLA (0) or TATT (1)
    IA_code: 0  # CFASTPT (0) or FASTPT (1) (only works if not NLA)
    IA_redshift_evolution: 3
    debug: false
    use_baryon_pca: false
    create_baryon_pca: false
    baryon_pca_select_sims: "antilles-2-99/antilles-101-378/antilles-380-400"
    filename_baryon_pca: "./projects/lsst_y1/chains/pca.txt"
params:
  As_1e9:
    prior:
      min: 0.5
      max: 5
    ref:
      dist: norm
      loc: 2.1
      scale: 0.25
    proposal: 0.2
    latex: 10^9 A_\mathrm{s}
    renames: A
  ns:
    prior:
      min: 0.87
      max: 1.07
    ref:
      dist: norm
      loc: 0.96605
      scale: 0.01
    proposal: 0.01
    latex: n_\mathrm{s}
  H0:
    prior:
      min: 55
      max: 91
    ref:
      dist: norm
      loc: 67.32
      scale: 5
    proposal: 3
    latex: H_0
  omegab:
    prior:
      min: 0.03
      max: 0.07
    ref:
      dist: norm
      loc: 0.0495
      scale: 0.004
    proposal: 0.004
    latex: \Omega_\mathrm{b}
  omegam:
    prior:
      min: 0.1
      max: 0.9
    ref:
      dist: norm
      loc: 0.316
      scale: 0.01
    proposal: 0.01
    latex: \Omega_\mathrm{m}
  w0pwa:
    prior:
      min: -5 
      max: -0.01
    ref:
      dist: norm
      loc: -0.99
      scale: 0.05
    proposal: 0.05
    latex: w_{0,\mathrm{DE}}+w_{a,\mathrm{DE}}
  w:
    prior:
      min: -3
      max: -0.01
    ref:
      dist: norm
      loc: -0.99
      scale: 0.05
    proposal: 0.05
    latex: w_{0,\mathrm{DE}}
  wa:
    value: 'lambda w0pwa, w: w0pwa - w'
    derived: false
    latex: 'w_{a,\mathrm{DE}}'
  mnu:
    value: 0.06
  omegabh2:
    value: 'lambda omegab, H0: omegab*(H0/100)**2'
    latex: \Omega_\mathrm{b} h^2
  omegach2:
    value: 'lambda omegam, omegab, mnu, H0: (omegam-omegab)*(H0/100)**2-(mnu*(3.046/3)**0.75)/94.0708'
    latex: \Omega_\mathrm{c} h^2
  As:
    value: 'lambda As_1e9: 1e-9 * As_1e9'
    latex: A_\mathrm{s}
  # ----------------------------------------------------------------------------
  # DES-Y3 nuisance parameters begins
  # ----------------------------------------------------------------------------
  # baryon effects: the first two PCs
  # Q1 informative: [0, 7]
  # Q1 wide: [-6, 20]
  # Q2: [-4, 4] 
  DES_BARYON_Q1:
    prior:
      min: 0.0
      max: 7.0
    ref:
      dist: norm
      loc: 2.0
      scale: 0.5
    proposal: 0.5
    latex: Q_\mathrm{DES}^1
  DES_BARYON_Q2:
    prior:
      min: -4.0
      max: 4.0
    ref:
      dist: norm
      loc: 2.0
      scale: 0.5
    proposal: 0.5
    latex: Q_\mathrm{DES}^2
  # ----------------------------------------------------------------------------
  # DES-Y3 nuisance parameters ends
  # ----------------------------------------------------------------------------
theory:
  emulrdrag:
    path: ./cobaya/cobaya/theories/
    provides: ['rdrag']
    extra_args:
      file: ['external_modules/data/emultrf/BAO_SN_RES/emul_lcdm_rdrag_GP.joblib'] 
      extra: ['external_modules/data/emultrf/BAO_SN_RES/extra_lcdm_rdrag.npy'] 
      ord: [['omegabh2','omegach2']]
  emulbaosn:
    path: ./cobaya/cobaya/theories/
    stop_at_error: True
    provides: ['comoving_radial_distance', 'angular_diameter_distance', 'Hubble']
    extra_args:
      device: "cuda"
      file:  [None, 'external_modules/data/emultrf/BAO_SN_RES/w0wa/emul_w0wa_H.pt']
      extra: [None, 'external_modules/data/emultrf/BAO_SN_RES/w0wa/extra_w0wa_H.npy']    
      ord: [None, ['omegam','H0','w','wa']]
      extrapar: [{'MLA': 'INT', 'ZMIN' : 0.0001, 'ZMAX' : 3, 'NZ' : 600},
                 {'MLA': 'ResMLP', 'offset' : 0.0, 'INTDIM' : 4, 'NLAYER' : 6,
                  'TMAT': 'external_modules/data/emultrf/BAO_SN_RES/w0wa/PCA_w0wa_H.npy',
                  'ZLIN': 'external_modules/data/emultrf/BAO_SN_RES/w0wa/z_lin_w0wa.npy'}]
  emulmps:
    path: ./cobaya/cobaya/theories/
    stop_at_error: True
    extra_args:
      model_file:    "external_modules/data/emultrf/emulmps/npce_emul/emulator_npce.keras"
      metadata_file: "external_modules/data/emultrf/emulmps/npce_emul/metadata.joblib"
      nl_model_file:    "external_modules/data/emultrf/emulmps/w0wa_halofit/emulator_halofit.keras"
      nl_metadata_file: "external_modules/data/emultrf/emulmps/w0wa_halofit/metadata.joblib"
      use_syren: False
      param_order: ["As_1e9", "ns", "H0", "omegab", "omegam", 'w', 'wa']
#  fastpt:
#    path: ./external_modules/code/FAST-PT
#    extra_args:
#      accuracyboost: 10
#      kmax_boltzmann: 7.5
#      extrap_kmax: 250.0
sampler:
  evaluate:
    N: 1
    override:
      As_1e9: 2.1
      ns: 0.96605
      H0: 67.32
      omegab: 0.04
      omegam: 0.3
      w0pwa: -1.0
      w: -1.0
      DES_DZ_S1: 0.0
      DES_DZ_S2: 0.0
      DES_DZ_S3: 0.0
      DES_DZ_S4: 0.0
      DES_M1: -0.0063
      DES_M2: -0.0198
      DES_M3: -0.0241
      DES_M4: -0.0369
      DES_BARYON_Q1: 0.0
      DES_BARYON_Q2: 0.0
      # TATT PARAMETERS
      DES_A1_1: -0.7
      DES_A1_2: -1.7
      DES_A2_1: 0.0
      DES_BTA_1: 0.0
#      DES_A2_1: 0.6
#      DES_BTA_1: 1.01257
      DES_A2_2: -1.51541
output: ./projects/desy1xplanck/chains/EXAMPLE_EMUL2_EVALUATE1
