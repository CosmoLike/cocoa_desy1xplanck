### Emulator training
### Motivation:
###     Train NN emulator to evaluate 6x2pt
###     - fiducial data vector: dmo
###     - scale cut: 0.25' for 3x2pt and as much as possible for c2x2pt
### -----------------------------------------------------------------
### cosmology: baseline (omegam, As, ns, omegab, H0, mnu, w0, w0pwa)
### survey footprint: include the extended annulus around DES Y3
### systematics: 
###     - photo-z uncertainty: gaussian
###     - intrinsic alignment: NLA
### analysis choice: 
###     - shear-shear: drop points below 2.5 arcmin
###     - Extended footprint
###     - with cross-cov between Ckk bandpower and 5x2pt
###     - using Planck DR4 map
### external probes: None
### data vector: simulated DMO

timing: True
debug: False
stop_at_error: False

likelihood:
  desy1xplanck.desy3xplanck_6x2pt:
    path: ./external_modules/data/desy1xplanck
    #data_file: datasets/Y3xPlanckPR4_050_ILLUSTRIS.dataset
    data_file: datasets/Y3xPlanckPR4_emu_DMO.dataset
    integration_accuracy: 0
    accuracyboost: 2
    subtract_mean: False
    use_weights_for_scenarios: False
    
    
params:
  As_1e9:
    prior:
      min: 0.5
      max: 5
    ref:
      dist: norm
      loc: 2.1
      scale: 0.00065
    proposal: 0.4
    latex: 10^9 A_\mathrm{s}
    drop: true
    renames: A
  As:
    value: 'lambda As_1e9: 1e-9 * As_1e9'
    latex: A_\mathrm{s}
  ns:
    prior:
      min: 0.87
      max: 1.07
    ref:
      dist: norm
      loc: 0.96605
      scale: 0.00001
    proposal: 0.01
    latex: n_\mathrm{s}
  H0:
    prior:
      min: 55
      max: 91
    ref:
      dist: norm
      loc: 67.32
      scale: 0.00005
    proposal: 3
    latex: H_0
  omegab:
    prior:
      min: 0.03
      max: 0.07
    ref:
      dist: norm
      loc: 0.04
      scale: 0.000004
    proposal: 0.004
    latex: \Omega_\mathrm{b}
    drop: true
  omegam:
    prior:
      min: 0.1
      max: 0.9
    ref:
      dist: norm
      loc: 0.3
      scale: 0.00002
    proposal: 0.02
    latex: \Omega_\mathrm{m}
    drop: true
  mnu:
    #value: 0.06
    prior:
      min: 0.0558
      max: 0.6
    ref:
      dist: norm
      loc: 0.06
      scale: 0.001
    proposal: 0.01  
    latex: m_{\nu}
  w:
    prior:
      min: -2.0
      max: -0.01
    ref:
      dist: norm
      loc: -1.0
      scale: 0.1
    proposal: 0.1
    latex: w_{0,\mathrm{DE}}
  w0pwa:
    prior:
      min: -3.5
      max: -0.5
    ref:
      dist: norm
      loc: -1.0
      scale: 0.1
    proposal: 0.1
    latex: w_{0,\mathrm{DE}}+w_{a,\mathrm{DE}}
    drop: True
  tau:
    value: 0.0697186
    latex: \tau_\mathrm{reio}
  # ------------------------------------------------------------------
  # ------------- Derived Parameters ---------------------------------
  # ------------------------------------------------------------------
  omegabh2:
    value: 'lambda omegab, H0: omegab*(H0/100)**2'
    latex: \Omega_\mathrm{b} h^2
  omegach2:
    value: 'lambda omegam, omegab, mnu, H0: (omegam-omegab)*(H0/100)**2-(mnu*(3.046/3)**0.75)/94.0708'
    latex: \Omega_\mathrm{c} h^2
  omegal:
    latex: \Omega_\Lambda
  omegamh2:
    derived: 'lambda omegam, H0: omegam*(H0/100)**2'
    latex: \Omega_\mathrm{m} h^2
  wa:
    value: 'lambda w0pwa, w: w0pwa - w'
    latex: w_{a,\mathrm{DE}}
  sigma8:
    latex: \sigma_8
  s8h5:
    derived: 'lambda sigma8, H0: sigma8*(H0*1e-2)**(-0.5)'
    latex: \sigma_8/h^{0.5}
  s8omegamp5:
    derived: 'lambda sigma8, omegam: sigma8*omegam**0.5'
    latex: \sigma_8 \Omega_\mathrm{m}^{0.5}
  s8omegamp25:
    derived: 'lambda sigma8, omegam: sigma8*omegam**0.25'
    latex: \sigma_8 \Omega_\mathrm{m}^{0.25}
  s8:
    derived: 'lambda sigma8, omegam: sigma8*(omegam/0.3)**0.5'
    latex: S_8
  age:
    latex: '{\rm{Age}}/\mathrm{Gyr}'
  rdrag:
    latex: r_\mathrm{drag}
  yheused:
    latex: Y_P^\mathrm{BBN}
  omegan2:
    latex: \Omega_\mathrm{\\nu} h^2
  omegan:
    derived: 'lambda omegan2, H0: omegan2/((H0/100)**2)'
    latex: \Omega_\mathrm{\\nu}
  # ------------------------------------------------------------------
  # DES-Y1 3x2 nuissance parameter begins
  # ------------------------------------------------------------------

  # intrinsic alignment: NLA
  # ========================
  # same as default, DES_A1_1 [-5, 5]; DES_A1_2 [-5, 5]
  # fiducial value: 0.6, -1.5
  DES_A1_1:
    prior:
     min: -5
     max:  5
    ref:
     dist: norm
     loc: -0.7
     scale: 0.00005
    proposal: 0.75
    latex: A_\mathrm{1-IA,DES}^1
  DES_A1_2:
    prior:
     min: -5
     max:  5
    ref:
     dist: norm
     loc: -1.7
     scale: 0.00005
    proposal: 0.75
    latex: A_\mathrm{1-IA,DES}^2
  # ------------------------------------------------------------------------
  # ------------------------------------------------------------------------
  # ------------------------------------------------------------------------
  # photo-z uncertainty: gaussian
  # =============================
  # Lens galaxies photo-z shift
  DES_DZ_L1:
    prior:
      dist: norm
      loc: -0.009
      scale: 0.007
    ref:
      dist: norm
      loc: -0.009
      scale: 0.000007
    proposal: 0.0035
    latex: \Delta z_\mathrm{l,DES}^1
  DES_DZ_L2:
    prior:
      dist: norm
      loc: -0.035
      scale: 0.011
    ref:
      dist: norm
      loc: -0.035
      scale: 0.000011
    proposal: 0.0055
    latex: \Delta z_\mathrm{l,DES}^2
  DES_DZ_L3:
    prior:
      dist: norm
      loc: -0.005
      scale: 0.006
    ref:
      dist: norm
      loc: -0.005
      scale: 0.000006
    proposal: 0.003
    latex: \Delta z_\mathrm{l,DES}^3
  DES_DZ_L4:
    prior:
      dist: norm
      loc: -0.007
      scale: 0.006
    ref:
      dist: norm
      loc: -0.007
      scale: 0.000006
    proposal: 0.003
    latex: \Delta z_\mathrm{l,DES}^4
  DES_DZ_L5:
    value: 0.0
    latex: \Delta z_\mathrm{l,DES}^5
  DES_DZ_L6:
    value: 0.0
    latex: \Delta z_\mathrm{l,DES}^6
  # =============================
  # Lens galaxies photo-z stretch
  DES_STRETCH_L1:
    prior:
      dist: norm
      loc: 0.975
      scale: 0.062
    ref:
      dist: norm
      loc: 0.975
      scale: 0.00006
    proposal: 0.03
    latex: \sigma z_\mathrm{l,DES}^1
  DES_STRETCH_L2:
    prior:
      dist: norm
      loc: 1.306
      scale: 0.093
    ref:
      dist: norm
      loc: 1.306
      scale: 0.00009
    proposal: 0.045
    latex: \sigma z_\mathrm{l,DES}^2
  DES_STRETCH_L3:
    prior:
      dist: norm
      loc: 0.870
      scale: 0.054
    ref:
      dist: norm
      loc: 0.870
      scale: 0.00005
    proposal: 0.025
    latex: \sigma z_\mathrm{l,DES}^3
  DES_STRETCH_L4:
    prior:
      dist: norm
      loc: 0.918
      scale: 0.051
    ref:
      dist: norm
      loc: 0.918
      scale: 0.00005
    proposal: 0.025
    latex: \sigma z_\mathrm{l,DES}^4
  DES_STRETCH_L5:
    value: 1.0
    latex: \sigma z_\mathrm{l,DES}^5
  DES_STRETCH_L6:
    value: 1.0
    latex: \sigma z_\mathrm{l,DES}^6
  # ------------------------------------------------------------------------
  # ------------------------------------------------------------------------
  # ------------------------------------------------------------------------
  # Source galaxies photo-z errors
  DES_DZ_S1:
    prior:
      dist: norm
      loc: 0.0
      scale: 0.018
    ref:
      dist: norm
      loc: 0.0
      scale: 0.000018
    proposal: 0.009
    latex: \Delta z_\mathrm{s,DES}^1
  DES_DZ_S2:
    prior:
      dist: norm
      loc: 0.0
      scale: 0.015
    ref:
      dist: norm
      loc: 0.0
      scale: 0.000015
    proposal: 0.0075
    latex: \Delta z_\mathrm{s,DES}^2
  DES_DZ_S3:
    prior:
      dist: norm
      loc: 0.0
      scale: 0.011
    ref:
      dist: norm
      loc: 0.0
      scale: 0.000011
    proposal: 0.0055
    latex: \Delta z_\mathrm{s,DES}^3
  DES_DZ_S4:
    prior:
      dist: norm
      loc: 0.0
      scale: 0.017
    ref:
      dist: norm
      loc: 0.0
      scale: 0.000017
    proposal: 0.0085
    latex: \Delta z_\mathrm{s,DES}^4
  # ------------------------------------------------------------------------
  # ------------------------------------------------------------------------
  # ------------------------------------------------------------------------
  # Higher-order IA
  DES_A2_1: #TATT, not used for Y1
    value: 0.0
    latex: A_\mathrm{2-IA,DES}^1 
  DES_A2_2: #TATT, not used for Y1
    value: 0.0
    latex: A_\mathrm{2-IA,DES}^2
  DES_BTA_1: #TATT, not used for Y1
    value: 0.0
    latex: A_\mathrm{BTA-IA,DES}^1
  # ------------------------------------------------------------------------
  # ------------------------------------------------------------------------
  # ------------------------------------------------------------------------
  # Linear galaxy bias
  DES_B1_1:
    prior:
      min: 0.8
      max: 3.0
    ref:
      dist: norm
      loc: 1.5
      scale: 0.1
    proposal: 0.1
    latex: b_\mathrm{1-DES}^1
  DES_B1_2:
    prior:
      min: 0.8
      max: 3.0
    ref:
      dist: norm
      loc: 1.8
      scale: 0.1
    proposal: 0.1
    latex: b_\mathrm{1-DES}^2
  DES_B1_3:
    prior:
      min: 0.8
      max: 3.0
    ref:
      dist: norm
      loc: 1.8
      scale: 0.1
    proposal: 0.1
    latex: b_\mathrm{1-DES}^3
  DES_B1_4:
    prior:
      min: 0.8
      max: 3.0
    ref:
      dist: norm
      loc: 1.9
      scale: 0.1
    proposal: 0.1
    latex: b_\mathrm{1-DES}^4
  DES_B1_5:
    value: 2.3
    latex: b_\mathrm{1-DES}^5
  DES_B1_6:
    value: 2.3
    latex: b_\mathrm{1-DES}^6
  # ------------------------------------------------------------------------
  # ------------------------------------------------------------------------
  # ------------------------------------------------------------------------
  # shear calibration bias: multiplicative
  DES_M1:
    value: -0.0063
    latex: m_\mathrm{DES}^1
  DES_M2:
    value: -0.0198
    latex: m_\mathrm{DES}^2
  DES_M3:
    value: -0.0241
    latex: m_\mathrm{DES}^3
  DES_M4:
    value: -0.0369
    latex: m_\mathrm{DES}^4
  # ------------------------------------------------------------------------
  # ------------------------------------------------------------------------
  # ------------------------------------------------------------------------
  # baryon effects: the first two PCs
  # Q1 informative: [0, 7]
  # Q1 wide: [-6, 20]
  # Q2: [-4, 4] 
  # =================================
  DES_BARYON_Q1:
    value: 0.0
    latex: Q_\mathrm{DES}^1
  DES_BARYON_Q2:
    value: 0.0
    latex: Q_\mathrm{DES}^2

  # ------------------------------------------------------------------
  # DES-Y1 3x2 nuissance parameter ends
  # ------------------------------------------------------------------
prior:
  bbn_consistency: "lambda omegab, H0: 1.45 if 0.005<=omegab*(H0/100)**2<=0.04 else -np.inf"

theory:
  camb:
    path: ./external_modules/code/CAMB
    use_renames: True
    extra_args:
      halofit_version: takahashi
      AccuracyBoost: 1.1
      lens_potential_accuracy: 1.1
      num_massive_neutrinos: 3
      nnu: 3.046
      dark_energy_model: ppf
      accurate_massive_neutrino_transfers: false
      k_per_logint: 20

emulator:
  io:
    ###savedir: ./projects/desy1xplanck/emulator
    savedir: /xdisk/timeifler/jiachuanxu/Y3xR4_w0waEmu_HF_NLA_output_v2
    save_train_data: true
    save_intermediate_model: true
    chainname: emu_testing_chain_nn6_vs_MCMC24
  shear_calib:
    mask: ./projects/desy1xplanck/data/emu_data/DESY3xPLKR4_Maglim_baseline_Ntheta30_shear_calib_mask.npy
    prior_std: 0.0091,0.0078,0.0076,0.0076
  baryons:
    n_pcas_baryon: 1
    #prior_Q1: -6.,20.
    prior_Q1: 0.0, 7.0
    #prior_Q2: -4.,4.
  # galaxy_bias:
  #   mask: ./projects/desy1xplanck/data/emu_data/DESY3xPLKR4_Maglim_baseline_Ntheta30_linear_gbias_mask.npy
  #   bias_fid: 1.5,1.8,1.8,1.9,2.3,2.3
  #   bias_prior: 0.8, 3.0
  init_sample:
    type: "gaussian" # "lhs" or "gaussian"
    # LHS section
    lhs_n: 18000 # Latin-Hyper Sample size
    # Gaussian section
    gauss_cov: ./projects/desy1xplanck/yaml/proposal_covmats/DESY3xPLKR4_6x2pt_emutrain.covmat
    gauss_temp_train: 128 # training dataset temperature
    n_train: 1000160
    #n_train: 10000
    gauss_shift_train: 
     # omegam: 0.0
     # sigma8: 0.0
    gauss_temp_valid: 64  # validation dataset temperature
    n_valid: 200032
    gauss_shift_valid:
  training:
    emu_type: nn
    nn_model: 9
    #dv_fid: ./projects/desy1xplanck/data/data_vectors/xi_DESY3xPLKR4_6x2pt_Maglim_baseline_Ntheta30_dmo.emufid
    chi_sq_cut: 1.0e+5
    n_train_iter: 1
    batch_size: 256
    n_epochs: 200
    loss_type: "hyperbola"
    #loss_type: "clipped_mean"
    #loss_type: "mean"
    learning_rate: 1.0e-3
    #weight_decay: 1.0e-3
    weight_decay: 1.0e-4
    dropout: 0.0
    reduce_lr: True
    do_pca: True
  derived:
    sigma8_fid: 0.827706
    sigma8_std: 0.01
  sampling:
    ### This mask is different from the mask in the dataset file
    ### Dataset mask: can short-cut model vector evaluation
    ### This mask: can not short-cut mv calculation, applied in EmuSampler likelihood calc
    ### BUT setting a different mask here would block the gradient back propagation, thus
    ### the cutted scales are note learnt. 
    #scalecut_mask: ./projects/desy1xplanck/data/masks/xi_DESY3xPLKR4_6x2pt_Maglim_baseline_Ntheta30_emucons.mask
    n_mcmc: 1000000
    #n_mcmc: 10000
    n_emcee_walkers: 100
    n_burn_in: 500000
    #n_burn_in: 5000
    n_thin: 10
    # temper0: 0.02
    # temper_increment: 0.05
